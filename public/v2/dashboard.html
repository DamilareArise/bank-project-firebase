<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="">

    <style>
        table {
            width: 50%;
            text-align: center;
            border: 1px solid;
            border-collapse: collapse;
        }

        td,
        th {
            border: 1px solid;
        }
    </style>
</head>

<body>
    <h4>Welcome back <span id="displayScreen"></span></h4>
    <div><b>Balance: </b> $<span id="balanceScreen"></span></div>
    <div><b>Account No: </b> <span id="numberScreen"></span></div>

    <div id="pinSetup">
        <input type="text" placeholder="PIN" id="userPin">
        <button id="setPin">Set pin</button>
    </div>

    <p id="alertScreen"></p>
    <hr>
    <p>Deposit</p>
    <input type="number" placeholder="Amount" id="depositAmount"><button id="depositAction">Deposit</button>
    <hr>
    <p>Withdrawal</p>
    <input type="number" placeholder="Amount" id="withdrawAmount"><button id="withdrawAction">Withdraw</button>
    <hr>

    <p>Transfer</p>
    <input type="text" placeholder="Recipient Account" id="transferAccount">
    <input type="number" placeholder="Amount" id="transferAmount">
    <button id="transferAction">Transfer</button>
    <hr>

    <h3>Transaction History</h3>
    <table>
        <thead>
            <th>ID</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Date & Time</th>
        </thead>
        <tbody id="trxScreen">

        </tbody>
    </table>
    <hr>
    <button id="logoutUser">Logout</button>



    <script type="module">
        import FirebaseBank from "./config.js"

        const myBank = new FirebaseBank()


        const reload_dashboard = (user) => {
            displayScreen.innerHTML = user.fullname
            balanceScreen.innerHTML = user.balance
            numberScreen.innerHTML = user.account_no
            console.log(user);
        }


        myBank.checkUserAuth()
            .then((res) => {
                if (!res['status']) {
                    window.location.href = "./index.html"
                }
                let user = res['data']
                reload_dashboard(user)
            })




        logoutUser.addEventListener("click", () => {
            myBank.logout()
        })


        depositAction.addEventListener("click", () => {
            let amount = depositAmount.value
            let res = myBank.performDeposit(amount)
            // console.log(res);
            alertScreen.innerHTML = res['message']
            if (res['status']) {
                let user = res['data']
                depositAmount.value = ''
                reload_dashboard(user)
            }
        })


        transferAction.addEventListener('click', () => {
            let recipient_acct = transferAccount.value
            let amount = transferAmount.value

            if(recipient_acct == ""){
                alertScreen.innerHTML = "Recipient account required"
                return;
            }

            myBank.getUserByAccount(recipient_acct)
            .then((recipient)=>{
                console.log(recipient);
                
                if(recipient){
                    let res =  myBank.performTransfer(recipient, amount)
                    // console.log(res);
                    alertScreen.innerHTML = res['message']
                    if(res['status']){
                        let user = res['data']
                        reload_dashboard(user)
                    }
                }else{
                    alertScreen.innerHTML = "Account not found"
                }

            })
        })

    </script>

</body>

</html>
