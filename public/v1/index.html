        let countMil = 0
        let countSec = 0
        let timeId;

        startCount.addEventListener("click", ()=>{
            if(timeId){
                clearInterval(timeId)
            }
            
            timeId = setInterval(()=>{
                if(countMil === 999){
                    countMil = 0
                    countSec += 1
                }
                myMil.innerHTML = countMil
                mySec.innerHTML = countSec
                countMil += 1
            }, 1)

        })

        stopCount.addEventListener("click", ()=>{
            clearInterval(timeId)
        })

        resetCount.addEventListener("click", ()=>{
            clearInterval(timeId)
            myMil.innerHTML = "000"
            mySec.innerHTML = "00"
